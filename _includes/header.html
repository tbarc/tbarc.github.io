<header class="site-header">

  <div class="wrapper">

    <a class="site-title" href="{{ site.baseurl }}/">{{ site.title }}</a>

    <div class="theme-mode-control">
      <button
        type="button"
        id="theme-mode-button"
        class="theme-mode-button"
        aria-haspopup="listbox"
        aria-expanded="false"
        aria-controls="theme-mode-menu"
      >
        <span id="theme-mode-current" class="theme-mode-current">Light</span>
        <span class="theme-mode-chevron" aria-hidden="true">
          <svg viewBox="0 0 12 12" class="theme-mode-chevron-icon" focusable="false">
            <path d="M2.5 4.5L6 8L9.5 4.5" />
          </svg>
        </span>
      </button>
      <div id="theme-mode-menu" class="theme-mode-menu" role="listbox" aria-label="Theme mode options">
        <button type="button" class="theme-mode-option" data-mode="light" role="option">Light</button>
        <button type="button" class="theme-mode-option" data-mode="dark" role="option">Dark</button>
        <button type="button" class="theme-mode-option" data-mode="party" role="option">Party</button>
      </div>
    </div>

    <nav class="site-nav">
      <input type="checkbox" id="nav-toggle" class="nav-toggle" />
      <label for="nav-toggle" class="menu-icon" aria-label="Toggle navigation">
        <span class="menu-icon-bars" aria-hidden="true">
          <span class="menu-icon-bar"></span>
          <span class="menu-icon-bar"></span>
          <span class="menu-icon-bar"></span>
        </span>
      </label>

      <div class="trigger">
        <a class="page-link" href="{{ site.baseurl }}/">Home</a>
        <a class="page-link" href="{{ site.baseurl }}/About/">About</a>
        <a class="page-link" href="{{ site.baseurl }}/R%C3%A9sum%C3%A9/">Résumé</a>
        <a class="page-link" href="{{ site.baseurl }}/Post%20Index/">Blog</a>
      </div>
    </nav>

  </div>

</header>
